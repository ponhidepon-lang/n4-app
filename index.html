<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N5変換音声アプリ（完全動作版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

.slider-box { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<h2>🎤 N5レベル変換・音声アプリ（完全動作版）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("音声認識に対応していません。Chrome を使ってください。");
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const isN5 = isN5Level(text);
    const n5text = convertToN5(text, isN5);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (isN5 ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}

// ===== N5判定 =====
function isN5Level(text) {
  if (text.match(/けど|ですが|しかし/)) return false;
  if (text.match(/くはなかったですか|くなかったですか/)) return false;
  if (text.match(/くはない|くない/)) return false;

  const hardWords = [
    "体感的","体調","状況","可能","必要","確認","使用",
    "理由","問題","変更","連絡","理解","説明","最近"
  ];
  for (const w of hardWords) {
    if (text.includes(w)) return false;
  }

  if (!text.match(/(です|ます|でした|ました|ですか|ますか)$/)) return false;

  return true;
}

// ===== ① 複文 → 単文 =====
function splitComplexSentence(text) {
  return text.replace(/けど|ですが|しかし/g, "。");
}

// ===== ② 否定疑問 → 肯定疑問 =====
function convertNegativeQuestionToPositive(text) {
  return text
    .replace(/(.+?)くはなかったですか/g, "$1かったですか")
    .replace(/(.+?)くなかったですか/g, "$1かったですか");
}

// ===== ③ 部分否定 → 肯定文 =====
function removePartialNegative(text) {
  return text
    .replace(/(.+?)くはない/g, "$1い")
    .replace(/(.+?)くない/g, "$1い");
}

// ===== ④ 語彙簡単化 =====
function simplifyVocabularyN5(text) {
  let t = text;

  const map = {
    "体感的": "どう感じますか",
    "体調": "からだの調子",
    "状況": "ようす",
    "可能": "できます",
    "必要": "いります",
    "確認": "たしかめます",
    "使用": "つかいます",
    "理由": "わけ",
    "問題": "こまったこと",
    "変更": "かえます",
    "連絡": "れんらく",
    "理解": "わかります",
    "説明": "せつめい",
    "最近": "さいきん"
  };

  for (const key in map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, map[key]);
  }

  return t;
}

// ===== ⑤ 文末正規化（最後に実行） =====
function normalizeSentenceEnd(text) {
  let t = text;

  t = t.replace(/(ですね|ですよね|ですよ|だよね|だよ|かな|かも|ね|よ)$/g, "");

  t = t.replace(/でしたか$/g, "でした");
  t = t.replace(/ましたか$/g, "ました");
  t = t.replace(/ますか$/g, "ます");
  t = t.replace(/ですか$/g, "です");

  t = t.replace(/か[？?]$/g, "");
  t = t.replace(/。$/g, "");

  return t.trim();
}

// ===== ⑥ N5疑問文に変換 =====
function convertToN5Question(text) {
  const t = text;

  if (t.match(/でした$/)) return t + "か";
  if (t.match(/ました$/)) return t + "か";
  if (t.match(/ます$/))   return t + "か";
  if (t.match(/です$/))   return t + "か";

  if (t.match(/(どこ|いつ|何|なに|だれ|誰)/)) {
    return t + "ですか";
  }

  if (t.includes("どうして") || t.includes("なぜ")) {
    return "どうしてですか";
  }

  return t + "ですか";
}

// ===== ★ 完全N5変換（判定つき） =====
function convertToN5(text, isN5) {
  let t = text;

  if (!isN5) {
    t = splitComplexSentence(t);
    t = convertNegativeQuestionToPositive(t);
    t = removePartialNegative(t);
    t = simplifyVocabularyN5(t);
  }

  t = normalizeSentenceEnd(t);
  return convertToN5Question(t);
}
</script>

</body>
</html>
