<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>完全N5変換エンジン（超拡張版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png">
  <meta name="theme-color" content="#ffffff">

  <style>
    body { font-family: sans-serif; padding: 20px; }
    button { font-size: 20px; padding: 12px 24px; }
    #status { margin-top: 20px; font-size: 22px; font-weight: bold; }
    .recording { color: red; animation: blink 1s infinite; }
    @keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
    .loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }
    .slider-box { margin-top: 20px; font-size: 18px; }
  </style>
</head>
<body>

<h2>🎤 完全N5変換エンジン（超拡張版）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("音声認識に対応していません。Chrome を使ってください。");
}

const startBtn   = document.getElementById("startBtn");
const statusDiv  = document.getElementById("status");
const resultDiv  = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== N5質問テンプレ（面接用・全部N5） =====
const N5_QUESTIONS = [
  // 仕事の理解
  "この仕事をするまえ、どう思いましたか。",
  "この仕事は、むずかしいと思いますか。",
  "この仕事で、なにがたいへんだと思いますか。",
  "この仕事で、なにをしたいですか。",
  // 経験
  "この仕事をしたことがありますか。",
  "どこでしましたか。",
  "どのくらいしましたか。",
  // 動機
  "どうして、この仕事をしたいですか。",
  "この仕事をえらんだわけはなんですか。",
  // 生活
  "にほんのくらしはどうですか。",
  "へやはどうですか。",
  "しごとのじかんはどうですか。",
  // 健康
  "からだはだいじょうぶですか。",
  "びょうきはありますか。",
  // 人間関係
  "しごとの人とはなかがいいですか。",
  "せんぱいはやさしいですか。",
  // 安全
  "あぶないことはありましたか。",
  "しごとで、なににきをつけていますか。"
];

// ===== N4語彙（拡張版） =====
const N4Words = [
  "イメージ","どのよう","について","考えていました","考える","印象","理由","内容","経験","説明","理解","状況",
  "社長","部長","課長","所長","主任","係長","社員","担当","責任","役員","管理","部署",
  "上司","先輩","後輩",
  "必要","可能","問題","変更","結果","資料","方法","途中","安全","危険","複雑","特別",
  "予定","準備","影響","効果","原因","目的","詳細","確認","調整","対応","報告","相談",
  "記録","比較","選択","決定","許可","禁止","案内","希望",
  "参加","出席","欠席","移動","到着","出発","開始","終了","保存","提出","受け取り",
  "登録","申請","予約","解決","改善","維持","増加","減少","発生","調査","検討",
  "最近","以前","以後","期間","平均","合計","期限","締切","順番","時間帯",
  "会議","打ち合わせ","契約","見積もり","請求","支払い","納品","発注","取引","顧客",
  "技能実習","実習生","監理団体","実習先","企業","工程","安全確認","危険物","保護具",
  "手順書","指示","注意事項","規則","規定","寮","宿舎","光熱費","家賃","送金","仕送り",
  "健康診断","症状","怪我","残業","休日出勤","シフト","勤務時間","文化","習慣","マナー"
];

// ===== N4文型パターン =====
const N4Patterns = [
  /どのように/g,
  /どのような/g,
  /について/g,
  /と思います/g,
  /と考え/g,
  /理由/g,
  /内容/g,
  /経験/g,
  /必要/g,
  /可能/g,
  /〜たことがあります/g
];

// ===== N5判定（語彙＋文型の2段階） =====
function isN5Level(text) {
  for (const w of N4Words) {
    if (text.includes(w)) return false;
  }
  for (const p of N4Patterns) {
    if (text.match(p)) return false;
  }
  // 「の」が多すぎる（多重修飾）もN4扱い
  if ((text.match(/の/g) || []).length >= 3) return false;
  return true;
}

// ===== 部品：所要時間・範囲・経験などの簡略化 =====
function simplifyDurationExpressions(t) {
  return t
    .replace(/何分かかりましたか？/g, "どのくらいかかりましたか？")
    .replace(/何時間かかりましたか？/g, "どのくらいかかりましたか？")
    .replace(/何分かかりました/g, "どのくらいかかりました")
    .replace(/何時間かかりました/g, "どのくらいかかりました");
}

function simplifyRangeExpressions(t) {
  return t
    .replace(/ここまで/g, "いままで")
    .replace(/そこまで/g, "そこまで")
    .replace(/あそこまで/g, "あそこまで");
}

function simplifyExperienceExpressions(t) {
  return t
    .replace(/見たことがありますか？/g, "見ましたか？")
    .replace(/働いたことがありますか？/g, "はたらきましたか？")
    .replace(/工場で働いたことがありますか？/g, "こうじょうではたらきましたか？")
    .replace(/日本で働いたことがありますか？/g, "にほんではたらきましたか？")
    .replace(/寮に住んだことがありますか？/g, "へやにすんだことがありますか？");
}

function splitComplexSentence(t) {
  return t.replace(/けど|ですが|しかし|なので|だから/g, "。");
}

function simplifyVerbsContext(t) {
  return t
    .replace(/出発してきましたか？/g, "出ましたか？")
    .replace(/出発してきました/g, "出ました")
    .replace(/出発しましたか？/g, "出ましたか？")
    .replace(/出発しました/g, "出ました")
    .replace(/出発します/g, "出ます");
}

// ===== N4→N5語彙マップ =====
const N4toN5Map = {
  "イメージ": "かんがえ",
  "印象": "かんがえ",
  "内容": "こと",
  "理由": "わけ",
  "上司": "上の人",
  "先輩": "まえからいる人",
  "後輩": "あとからきた人",
  "部長": "えらい人",
  "課長": "えらい人",
  "所長": "えらい人",
  "主任": "えらい人",
  "係長": "えらい人",
  "技能実習": "しごとのべんきょう",
  "実習生": "しごとのべんきょうをする人",
  "作業": "しごと",
  "工程": "しごとのながれ",
  "安全確認": "あんぜんをたしかめます",
  "危険物": "あぶないもの",
  "保護具": "まもるもの",
  "手順書": "やりかたのかみ",
  "指示": "いいます",
  "注意事項": "きをつけること",
  "寮": "へや",
  "宿舎": "へや",
  "光熱費": "でんきやガスのおかね",
  "家賃": "へやのおかね",
  "送金": "おかねをおくります",
  "仕送り": "おかねをおくります",
  "健康診断": "からだのけんさ",
  "症状": "ぐあい",
  "怪我": "けが",
  "残業": "よるまでしごと",
  "休日出勤": "やすみの日にしごと",
  "シフト": "しごとのじかん",
  "勤務時間": "しごとのじかん",
  "文化": "にほんのこと",
  "習慣": "いつものこと",
  "マナー": "ルール",
  "ゴミ分別": "ごみをわけます"
};

function applyN4toN5Vocabulary(t) {
  for (const key in N4toN5Map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, N4toN5Map[key]);
  }
  return t;
}

// ===== 文末整形 =====
function normalizeSentenceEnd(t) {
  t = t.trim();
  t = t.replace(/[。．？?]+$/g, "");
  return t.trim();
}

function ensureQuestionMark(t) {
  if (t.endsWith("？") || t.endsWith("?")) return t;
  if (t.endsWith("か") || t.endsWith("かね")) return t + "？";
  if (t.endsWith("か。")) return t.slice(0, -1) + "？";
  return t;
}

// ===== ★ 完全N5変換エンジン（強化版） =====
function convertToN5(text) {
  let t = text;

  t = splitComplexSentence(t);
  t = simplifyVerbsContext(t);
  t = simplifyExperienceExpressions(t);
  t = simplifyDurationExpressions(t);
  t = simplifyRangeExpressions(t);
  t = applyN4toN5Vocabulary(t);

  // 抽象表現の簡略化
  t = t.replace(/どのように/g, "どう");
  t = t.replace(/どのような/g, "どんな");
  t = t.replace(/について/g, "のことを");

  t = normalizeSentenceEnd(t);
  t = ensureQuestionMark(t);

  return t;
}

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const n5text  = convertToN5(text);
    const n5judge = isN5Level(text);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (n5judge ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}
</script>

<!-- PWA Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/n4-app/sw.js");
}
</script>

</body>
</html>
