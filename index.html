<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N5変換音声アプリ（完全N5化）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

.slider-box { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<h2>🎤 N5レベル変換・音声アプリ（完全N5化・自然疑問文）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const isN5 = isN5Level(text);
    const n5text = convertToN5(text);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (isN5 ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };
}

// ===== N5判定 =====
function isN5Level(text) {
  const hardWords = [
    "慣れ","出発","説明","連絡","理解","使用","必要","可能","状況"
  ];
  for (const w of hardWords) {
    if (text.includes(w)) return false;
  }
  if (text.match(/けど|ですが|しかし/)) return false;
  return true;
}

// ===== ① 複文 → 単文 =====
function splitComplexSentence(text) {
  return text.replace(/けど|ですが|しかし|なので|だから/g, "。");
}

// ===== ② 否定疑問 → 肯定疑問 =====
function convertNegativeQuestionToPositive(text) {
  return text
    .replace(/(.+?)くはなかったですか/g, "$1かったですか")
    .replace(/(.+?)くなかったですか/g, "$1かったですか");
}

// ===== ③ 部分否定 → 肯定文 =====
function removePartialNegative(text) {
  return text
    .replace(/(.+?)くはない/g, "$1い")
    .replace(/(.+?)くない/g, "$1い");
}

// ===== ④ 複合動詞 → 単純動詞 =====
function simplifyComplexVerbs(text) {
  return text
    .replace(/出発して来ました/g, "出ました")
    .replace(/出発してきました/g, "出ました");
}

// ===== ⑤ N4/N3語彙 → N5語彙 =====
function simplifyToN5Vocabulary(text) {
  let t = text;

  const map = {
    "慣れましたか": "どうですか",
    "慣れました": "どうですか",
    "慣れていますか": "どうですか",
    "慣れた": "どうですか",
    "慣れる": "なれます",
    "出発": "出ます",
    "説明": "せつめい",
    "連絡": "れんらく",
    "理解": "わかります",
    "使用": "つかいます",
    "必要": "いります",
    "可能": "できます",
    "状況": "ようす"
  };

  for (const key in map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, map[key]);
  }

  return t;
}

// ===== ⑥ 「〜したか」→「〜しましたか」 =====
function convertShitaToShimashita(text) {
  return text.replace(/したか$/g, "しましたか");
}

// ===== ⑦ 「〜たか」→「〜ましたか」 =====
function convertTaToMashita(text) {
  return text.replace(/([ぁ-んァ-ン一-龥]+)たか$/g, "$1ましたか");
}

// ===== ⑧ 文末正規化 =====
function normalizeSentenceEnd(text) {
  let t = text;

  t = t.replace(/(ですね|ですよね|ですよ|だよね|だよ|かな|かも|ね|よ)$/g, "");
  t = t.replace(/。$/g, "");

  return t.trim();
}

// ===== ⑨ N5疑問文化（A案：二重疑問防止） =====
function convertToN5Question(text) {
  // すでに疑問文なら何もしない
  if (text.match(/ましたか$/)) return text;
  if (text.match(/ですか$/)) return text;

  // 丁寧形 → 疑問形
  if (text.match(/でした$/)) return text + "か";
  if (text.match(/ました$/)) return text + "か";
  if (text.match(/ます$/))   return text + "か";
  if (text.match(/です$/))   return text + "か";

  // それ以外は「ですか」
  return text + "ですか";
}

// ===== ★ 完全N5変換 =====
function convertToN5(text) {
  let t = text;

  t = splitComplexSentence(t);
  t = convertNegativeQuestionToPositive(t);
  t = removePartialNegative(t);
  t = simplifyComplexVerbs(t);
  t = simplifyToN5Vocabulary(t);

  t = convertShitaToShimashita(t);
  t = convertTaToMashita(t);

  t = normalizeSentenceEnd(t);
  return convertToN5Question(t);
}
</script>

</body>
</html>
