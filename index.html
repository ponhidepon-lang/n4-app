<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N4変換音声アプリ<title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }

#status {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* 録音中：赤点滅 */
.recording {
  color: red;
  animation: blink 1s infinite;
}
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* 変換中：青いぐるぐる */
.loading::after {
  content: " 🔄";
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.slider-box {
  margin-top: 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<h2>🎤 N4レベル変換・音声出力アプリ（自然疑問文・完全最新版）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<!-- 読み上げ速度調整 -->
<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("このブラウザは音声認識に対応していません。Chrome系を推奨します。");
}

const startBtn   = document.getElementById("startBtn");
const statusDiv  = document.getElementById("status");
const resultDiv  = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

// スライダー表示更新
rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;

  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";

  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    resultDiv.innerHTML = "認識結果: " + text;

    // N4自然疑問文変換
    const n4text = convertToNaturalN4(text);

    setTimeout(() => {
      statusDiv.className = "";
      statusDiv.innerHTML = "🟢 読み上げ中…";

      resultDiv.innerHTML += "<br>➡ N4変換: " + n4text;

      // 読み上げ前に cancel()
      if (speechSynthesis.speaking || speechSynthesis.pending) {
        speechSynthesis.cancel();
      }

      const uttr = new SpeechSynthesisUtterance(n4text);
      uttr.lang  = "ja-JP";
      uttr.rate  = parseFloat(rateSlider.value);

      speechSynthesis.speak(uttr);

      uttr.onend = () => {
        statusDiv.innerHTML = "✔ 完了";
      };
    }, 400);
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}

// ===== 文末正規化（強化版） =====
function normalizeSentenceEnd(text) {
  let t = text;

  // 終助詞削除
  t = t.replace(/(ですね|ですよね|ですよ|だよね|だよ|かな|かも|ね|よ)$/g, "");

  // 「でしたか」「ましたか」「ますか」「ですか」を壊さず語幹に戻す
  t = t.replace(/でしたか$/g, "でした");
  t = t.replace(/ましたか$/g, "ました");
  t = t.replace(/ますか$/g, "ます");
  t = t.replace(/ですか$/g, "です");

  // 疑問符削除
  t = t.replace(/か[？?]$/g, "");

  // 句点削除
  t = t.replace(/。$/g, "");

  return t.trim();
}

// ===== 自然なN4疑問文変換（完全版） =====
function convertToNaturalN4(text) {
  const t = normalizeSentenceEnd(text);

  // ★ 最優先：丁寧語（です／ます／ました／でした）はそのまま疑問文
  if (t.match(/でした$/)) return t + "か";
  if (t.match(/ました$/)) return t + "か";
  if (t.match(/ます$/))   return t + "か";
  if (t.match(/です$/))   return t + "か";

  // ★ 理由系 → んですか
  if (t.includes("なぜ") || t.includes("どうして")) {
    return t + "んですか";
  }

  // ★ 疑問詞 → ですか
  if (t.match(/(どこ|いつ|何|なに|だれ|誰)/)) {
    return t + "ですか";
  }

  // ★ 終助詞つき → ですかね
  if (text.match(/(ね|よ)$/)) {
    return t + "ですかね";
  }

  // ★ デフォルト → ですか
  return t + "ですか";
}

// ===== PWA =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker
    .register("sw.js")
    .then(() => console.log("SW登録成功"))
    .catch(err => console.log("SW登録失敗:", err));
}
</script>

</body>
</html>
