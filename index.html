<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N5変換音声アプリ（最終版：N5仕様＋判定）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

.slider-box { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<h2>🎤 N5レベル変換・音声アプリ（最終版：N5仕様）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const isN5 = isN5Level(text);
    const n5text = convertToN5(text);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (isN5 ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}

// ===== N5判定（ざっくりヒューリスティック） =====
function isN5Level(text) {
  const hardWords = [
    "慣れ","出発","説明","連絡","理解","使用",
    "必要","可能","状況","体調","変更","最近"
  ];
  for (const w of hardWords) {
    if (text.includes(w)) return false;
  }
  if (text.match(/けど|ですが|しかし|ので|ために/)) return false;
  return true;
}

// ===== ① 複文 → 単文（N5向けに分割） =====
function splitComplexSentence(text) {
  return text.replace(/けど|ですが|しかし|なので|だから/g, "。");
}

// ===== ② 複合動詞 → 単純動詞（N5仕様） =====
function simplifyComplexVerbs(text) {
  return text
    .replace(/出発して来ましたか？/g, "出ましたか？")
    .replace(/出発してきましたか？/g, "出ましたか？")
    .replace(/出発して来ました/g, "出ました")
    .replace(/出発してきました/g, "出ました")
    .replace(/出発して来た/g, "出ました")
    .replace(/出発してきた/g, "出ました")
    .replace(/説明してくれましたか？/g, "せつめいしましたか？")
    .replace(/説明してくれました/g, "せつめいしました")
    .replace(/連絡してくれましたか？/g, "れんらくしましたか？")
    .replace(/連絡してくれました/g, "れんらくしました");
}

// ===== ③ 語彙 → N5語彙（自然N5） =====
function simplifyToN5Vocabulary(text) {
  let t = text;

  const map = {
    "慣れましたか": "どうですか",
    "慣れました": "どうですか",
    "慣れていますか": "どうですか",
    "慣れた": "どうですか",
    "慣れる": "なれます",

    "出発": "出ます",
    "説明": "せつめい",
    "連絡": "れんらく",
    "理解": "わかります",
    "使用": "つかいます",
    "必要": "いります",
    "可能": "できます",
    "状況": "ようす",
    "体調": "からだの調子",
    "理由": "わけ",
    "問題": "こまったこと",
    "変更": "かえます",
    "最近": "さいきん"
  };

  for (const key in map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, map[key]);
  }

  return t;
}

// ===== ④ 文末のノイズ除去（句点・全角スペースなど） =====
function normalizeSentenceEnd(text) {
  let t = text.trim();
  t = t.replace(/[。．]+$/g, ""); // 文末の。を削除
  return t.trim();
}

// ===== ⑤ 疑問文の「？」付与（形式は尊重） =====
function ensureQuestionMark(text) {
  let t = text.trim();

  // すでに「？」が付いていればそのまま
  if (t.endsWith("？") || t.endsWith("?")) return t;

  // 「か」で終わるなら疑問文とみなして「？」を付ける
  if (t.endsWith("か")) return t + "？";

  // 「か。」のような誤認識パターン
  if (t.endsWith("か。")) return t.slice(0, -1) + "？";

  // それ以外はそのまま（平叙文）
  return t;
}

// ===== ★ 完全N5変換（あなたの仕様に合わせた最終版） =====
function convertToN5(text) {
  let t = text;

  // ① 複文を単文に
  t = splitComplexSentence(t);

  // ② 複合動詞 → 単純動詞
  t = simplifyComplexVerbs(t);

  // ③ 語彙 → N5語彙
  t = simplifyToN5Vocabulary(t);

  // ④ 文末ノイズ除去（。だけ消す）
  t = normalizeSentenceEnd(t);

  // ⑤ 疑問形式は尊重しつつ「？」だけ整える
  t = ensureQuestionMark(t);

  return t;
}
</script>

</body>
</html>
