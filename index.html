<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N5変換音声アプリ（文脈置換・完全N5エンジン）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

.slider-box { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<h2>🎤 N5レベル変換・音声アプリ（文脈置換・完全N5仕様）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("音声認識に対応していません。Chrome を使ってください。");
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const isN5 = isN5Level(text);
    const n5text = convertToN5(text);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (isN5 ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}

// ===== N5判定（ざっくり） =====
function isN5Level(text) {
  const hardWords = [
    "慣れ","出発","説明","連絡","理解","使用",
    "必要","可能","状況","体調","変更","最近","ために","ので"
  ];
  for (const w of hardWords) {
    if (text.includes(w)) return false;
  }
  if (text.match(/けど|ですが|しかし/)) return false;
  return true;
}

// ===== ① 複文 → 単文 =====
function splitComplexSentence(text) {
  return text.replace(/けど|ですが|しかし|なので|だから/g, "。");
}

// ===== ② 複合動詞・動詞活用の文脈置換（N4→N5） =====
function simplifyVerbsContext(text) {
  let t = text;

  // 出発する 系
  t = t.replace(/出発してきましたか？/g, "出ましたか？");
  t = t.replace(/出発して来ましたか？/g, "出ましたか？");
  t = t.replace(/出発してきました/g, "出ました");
  t = t.replace(/出発して来ました/g, "出ました");
  t = t.replace(/出発しましたか？/g, "出ましたか？");
  t = t.replace(/出発しました/g, "出ました");
  t = t.replace(/出発します/g, "出ます");

  // 説明する 系
  t = t.replace(/説明してくれましたか？/g, "せつめいしましたか？");
  t = t.replace(/説明してくれました/g, "せつめいしました");
  t = t.replace(/説明しましたか？/g, "せつめいしましたか？");
  t = t.replace(/説明しました/g, "せつめいしました");
  t = t.replace(/説明します/g, "せつめいします");

  // 連絡する 系
  t = t.replace(/連絡してくれましたか？/g, "れんらくしましたか？");
  t = t.replace(/連絡してくれました/g, "れんらくしました");
  t = t.replace(/連絡しましたか？/g, "れんらくしましたか？");
  t = t.replace(/連絡しました/g, "れんらくしました");
  t = t.replace(/連絡します/g, "れんらくします");

  // 理解する 系
  t = t.replace(/理解しましたか？/g, "わかりましたか？");
  t = t.replace(/理解しました/g, "わかりました");
  t = t.replace(/理解できます/g, "わかります");

  // 使用する 系
  t = t.replace(/使用しました/g, "つかいました");
  t = t.replace(/使用します/g, "つかいます");

  return t;
}

// ===== ③ 名詞・形容表現の文脈置換（N4→N5） =====
function simplifyNounsContext(text) {
  let t = text;

  t = t.replace(/必要です/g, "いります");
  t = t.replace(/必要があります/g, "いります");
  t = t.replace(/可能です/g, "できます");
  t = t.replace(/状況/g, "ようす");
  t = t.replace(/体調/g, "からだの調子");
  t = t.replace(/理由/g, "わけ");
  t = t.replace(/問題/g, "こまったこと");
  t = t.replace(/変更/g, "かえます");
  t = t.replace(/最近/g, "さいきん");

  // 慣れる 系（自然N5）
  t = t.replace(/日本の生活には慣れましたか？/g, "日本の生活はどうですか？");
  t = t.replace(/日本の生活には慣れましたか/g, "日本の生活はどうですか");
  t = t.replace(/日本の生活に慣れましたか？/g, "日本の生活はどうですか？");
  t = t.replace(/日本の生活に慣れましたか/g, "日本の生活はどうですか");

  return t;
}

// ===== ④ 文末ノイズ除去（句点・全角スペース・重複？） =====
function normalizeSentenceEnd(text) {
  let t = text.trim();
  t = t.replace(/[。．]+$/g, "");
  t = t.replace(/[？?]+$/g, "");
  return t.trim();
}

// ===== ⑤ 疑問文の「？」付与（形式は尊重） =====
function ensureQuestionMark(text) {
  let t = text.trim();

  // すでに「？」が付いていればそのまま
  if (t.endsWith("？") || t.endsWith("?")) return t;

  // 「か」で終わるなら疑問文とみなして「？」を付ける
  if (t.endsWith("か")) return t + "？";
  if (t.endsWith("かね")) return t + "？";

  // 「か。」のような誤認識パターン
  if (t.endsWith("か。")) return t.slice(0, -1) + "？";

  // それ以外はそのまま（平叙文）
  return t;
}

// ===== ★ 完全N5変換（文脈置換方式） =====
function convertToN5(text) {
  let t = text;

  // ① 複文 → 単文
  t = splitComplexSentence(t);

  // ② 動詞・複合動詞の文脈置換
  t = simplifyVerbsContext(t);

  // ③ 名詞・表現の文脈置換
  t = simplifyNounsContext(t);

  // ④ 文末ノイズ除去（。と？を一旦外す）
  t = normalizeSentenceEnd(t);

  // ⑤ 疑問形式はそのまま尊重しつつ「？」だけ整える
  t = ensureQuestionMark(t);

  return t;
}
</script>

</body>
</html>
