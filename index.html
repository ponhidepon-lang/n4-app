<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>N5変換音声アプリ（語彙簡単化つき）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }
</style>
</head>
<body>

<h2>🎤 N5レベル変換・音声アプリ（語彙もやさしく）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("音声認識に対応していません。Chrome を使ってください。");
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    resultDiv.innerHTML = "認識結果: " + text;

    const n5text = convertToN5(text);

    setTimeout(() => {
      statusDiv.className = "";
      statusDiv.innerHTML = "🟢 完了";

      resultDiv.innerHTML += "<br>➡ N5変換: " + n5text;

      if (speechSynthesis.speaking || speechSynthesis.pending) {
        speechSynthesis.cancel();
      }
      const uttr = new SpeechSynthesisUtterance(n5text);
      uttr.lang = "ja-JP";
      speechSynthesis.speak(uttr);
    }, 300);
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}

// ===== 語彙をN5レベルに簡単化 =====
function simplifyVocabularyN5(text) {
  let t = text;

  const map = {
    "体感的": "どう感じますか",
    "体感": "感じ",
    "体調": "からだの調子",
    "状況": "ようす",
    "可能": "できます",
    "必要": "いります",
    "確認": "たしかめます",
    "使用": "つかいます",
    "理由": "わけ",
    "問題": "こまったこと",
    "変更": "かえます",
    "連絡": "れんらく",
    "理解": "わかります",
    "説明": "せつめい",
    "最近": "さいきん"
  };

  for (const key in map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, map[key]);
  }

  return t;
}

// ===== 文末正規化 =====
function normalizeSentenceEnd(text) {
  let t = text;

  t = t.replace(/(ですね|ですよね|ですよ|だよね|だよ|かな|かも|ね|よ)$/g, "");

  t = t.replace(/でしたか$/g, "でした");
  t = t.replace(/ましたか$/g, "ました");
  t = t.replace(/ますか$/g, "ます");
  t = t.replace(/ですか$/g, "です");

  t = t.replace(/か[？?]$/g, "");
  t = t.replace(/。$/g, "");

  return t.trim();
}

// ===== N5変換ロジック（語彙簡単化つき） =====
function convertToN5(text) {
  // ① 語彙をN5に簡単化
  let t = simplifyVocabularyN5(text);

  // ② 文末正規化
  t = normalizeSentenceEnd(t);

  // ③ 丁寧語はそのまま疑問文
  if (t.match(/でした$/)) return t + "か";
  if (t.match(/ました$/)) return t + "か";
  if (t.match(/ます$/))   return t + "か";
  if (t.match(/です$/))   return t + "か";

  // ④ 疑問詞
  if (t.match(/(どこ|いつ|何|なに|だれ|誰)/)) {
    return t + "ですか";
  }

  // ⑤ 理由系（N5では簡単化）
  if (t.includes("どうして") || t.includes("なぜ")) {
    return "どうしてですか";
  }

  // ⑥ デフォルト
  return t + "ですか";
}
</script>

</body>
</html>
