<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>完全N5変換エンジン（超拡張版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; padding: 20px; }
button { font-size: 20px; padding: 12px 24px; }
#status { margin-top: 20px; font-size: 22px; font-weight: bold; }
.recording { color: red; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;} 50%{opacity:0.2;} 100%{opacity:1;} }
.loading::after { content:" 🔄"; animation: spin 1s linear infinite; }
@keyframes spin { 0%{transform:rotate(0);} 100%{transform:rotate(360deg);} }

.slider-box { margin-top: 20px; font-size: 18px; }
</style>
</head>
<body>

<h2>🎤 完全N5変換エンジン（超拡張版）</h2>
<p>ボタンを押して話してください。</p>

<button id="startBtn">録音開始</button>

<div id="status"></div>
<div id="result"></div>

<div class="slider-box">
  🔊 読み上げ速度：<span id="rateValue">1.0</span><br>
  <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.1" value="1.0">
</div>

<script>
// ===== 音声認識 =====
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = "ja-JP";
  recognition.interimResults = false;
} else {
  alert("音声認識に対応していません。Chrome を使ってください。");
}

const startBtn  = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const resultDiv = document.getElementById("result");
const rateSlider = document.getElementById("rateSlider");
const rateValue  = document.getElementById("rateValue");

rateSlider.oninput = () => {
  rateValue.textContent = rateSlider.value;
};

// ===== N4語彙（判定用・超拡張版） =====
const N4Words = [

  // 役職・組織
  "社長","部長","課長","所長","主任","係長","社員","担当","責任","役員","管理","部署",

  // 抽象語
  "経験","説明","連絡","理解","必要","可能","状況","体調","理由","問題","変更","結果",
  "資料","方法","途中","安全","危険","複雑","特別","場合","以上","以下","以外","関係",
  "予定","準備","連続","影響","効果","原因","目的","内容","詳細","確認","調整","対応",
  "報告","相談","記録","比較","選択","決定","許可","禁止","注意","案内","希望",

  // 動作・状態
  "参加","出席","欠席","移動","到着","出発","開始","終了","保存","提出","受け取り",
  "登録","申請","予約","解決","改善","維持","増加","減少","発生","調査","検討",

  // 時間・数量
  "最近","以前","以後","期間","回数","全員","全体","部分","多数","少数","平均","合計",
  "期限","締切","順番","順序","時間帯","当日","翌日","翌週","翌月",

  // ビジネス語
  "会議","打ち合わせ","報告書","契約","見積もり","請求","支払い","納品","発注",
  "取引","顧客","担当者","営業","開発","品質","効率","生産","在庫",

  // 技能実習生向け語彙
  "技能実習","実習生","監理団体","実習先","企業","工場","作業","工程","安全確認",
  "危険物","保護具","手順書","指示","注意事項","規則","規定",
  "寮","宿舎","光熱費","家賃","送金","仕送り","銀行口座","保険","年金","在留カード",
  "更新","手続き","申請","面談","講習","研修","指導員","班長","先輩","後輩",
  "宗教","礼拝","食事制限","アレルギー","健康診断","病院","通院","症状","怪我",
  "残業","休日出勤","シフト","勤務時間","休憩","遅刻","欠勤","早退",
  "日本語能力","会話","読解","聴解","テスト","勉強","宿題",
  "文化","習慣","マナー","ゴミ分別","地域","自治会","行事",

  // ホームページ類義語
  "ホームページ","HP","ウェブサイト","ウェブページ","サイト","公式サイト","ページ"
];

// ===== N4→N5 文脈置換マップ（超拡張版） =====
const N4toN5Map = {

  // 役職
  "社長": "えらい人",
  "部長": "えらい人",
  "課長": "えらい人",
  "所長": "えらい人",
  "主任": "えらい人",
  "係長": "えらい人",

  // 動詞系
  "説明しました": "せつめいしました",
  "説明します": "せつめいします",
  "連絡しました": "れんらくしました",
  "連絡します": "れんらくします",
  "理解しました": "わかりました",
  "理解できます": "わかります",
  "確認しました": "たしかめました",
  "確認します": "たしかめます",

  // 名詞・抽象語
  "必要です": "いります",
  "可能です": "できます",
  "状況": "ようす",
  "体調": "からだの調子",
  "理由": "わけ",
  "問題": "こまったこと",
  "変更": "かえます",
  "最近": "さいきん",
  "資料": "しりょう",
  "方法": "やり方",
  "結果": "けっか",
  "準備": "じゅんび",
  "内容": "こと",
  "詳細": "くわしいこと",
  "目的": "やりたいこと",
  "影響": "えいきょう",
  "効果": "こうか",

  // ビジネス語
  "会議": "かいぎ",
  "打ち合わせ": "はなしあい",
  "契約": "けいやく",
  "支払い": "おかねをはらうこと",
  "顧客": "おきゃくさん",
  "担当者": "その人",
  "品質": "ひんしつ",
  "改善": "よくします",

  // 技能実習生向け
  "技能実習": "しごとのべんきょう",
  "実習生": "しごとのべんきょうをする人",
  "工場": "こうじょう",
  "作業": "しごと",
  "工程": "しごとのながれ",
  "安全確認": "あんぜんをたしかめます",
  "危険物": "あぶないもの",
  "保護具": "まもるもの",
  "手順書": "やりかたのかみ",
  "指示": "いいます",
  "注意事項": "きをつけること",
  "寮": "へや",
  "宿舎": "へや",
  "光熱費": "でんきやガスのおかね",
  "家賃": "へやのおかね",
  "送金": "おかねをおくります",
  "仕送り": "おかねをおくります",
  "健康診断": "からだのけんさ",
  "症状": "ぐあい",
  "怪我": "けが",
  "残業": "よるまでしごと",
  "休日出勤": "やすみの日にしごと",
  "シフト": "しごとのじかん",
  "勤務時間": "しごとのじかん",
  "遅刻": "おくれます",
  "欠勤": "やすみます",
  "文化": "にほんのこと",
  "習慣": "いつものこと",
  "マナー": "ルール",
  "ゴミ分別": "ごみをわけます",

  // ホームページ類義語 → ページ
  "ホームページ": "ページ",
  "HP": "ページ",
  "ウェブサイト": "ページ",
  "ウェブページ": "ページ",
  "サイト": "ページ",
  "公式サイト": "ページ"
};

// ===== N5判定 =====
function isN5Level(text) {
  for (const w of N4Words) {
    if (text.includes(w)) return false;
  }
  if (text.match(/と言いますか|ので|ために/)) return false;
  if ((text.match(/の/g) || []).length >= 3) return false;
  if (text.match(/けど|ですが|しかし/)) return false;
  return true;
}

// ===== 経験表現 → N5仕様 =====
function simplifyExperienceExpressions(t) {
  return t
    .replace(/見たことがありますか？/g, "見ましたか？")
    .replace(/働いたことがありますか？/g, "はたらきましたか？")
    .replace(/工場で働いたことがありますか？/g, "こうじょうではたらきましたか？")
    .replace(/日本で働いたことがありますか？/g, "にほんではたらきましたか？")
    .replace(/寮に住んだことがありますか？/g, "へやにすんだことがありますか？");
}

// ===== 複文 → 単文 =====
function splitComplexSentence(text) {
  return text.replace(/けど|ですが|しかし|なので|だから/g, "。");
}

// ===== 複合動詞 =====
function simplifyVerbsContext(t) {
  return t
    .replace(/出発してきましたか？/g, "出ましたか？")
    .replace(/出発してきました/g, "出ました")
    .replace(/出発しましたか？/g, "出ましたか？")
    .replace(/出発しました/g, "出ました")
    .replace(/出発します/g, "出ます");
}

// ===== N4語彙 → N5語彙 =====
function applyN4toN5Vocabulary(t) {
  for (const key in N4toN5Map) {
    const reg = new RegExp(key, "g");
    t = t.replace(reg, N4toN5Map[key]);
  }
  return t;
}

// ===== 文末整形 =====
function normalizeSentenceEnd(t) {
  t = t.trim();
  t = t.replace(/[。．？?]+$/g, "");
  return t.trim();
}

// ===== 疑問文の「？」付与 =====
function ensureQuestionMark(t) {
  if (t.endsWith("？") || t.endsWith("?")) return t;
  if (t.endsWith("か") || t.endsWith("かね")) return t + "？";
  if (t.endsWith("か。")) return t.slice(0, -1) + "？";
  return t;
}

// ===== ★ 完全N5変換エンジン（超拡張版） =====
function convertToN5(text) {
  let t = text;

  t = splitComplexSentence(t);
  t = simplifyVerbsContext(t);
  t = simplifyExperienceExpressions(t);
  t = applyN4toN5Vocabulary(t);

  t = normalizeSentenceEnd(t);
  t = ensureQuestionMark(t);

  return t;
}

// ===== 録音開始 =====
startBtn.onclick = () => {
  if (!recognition) return;
  statusDiv.innerHTML = "🎤 録音中…";
  statusDiv.className = "recording";
  resultDiv.innerHTML = "";
  recognition.start();
};

// ===== 音声認識結果 =====
if (recognition) {
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.trim();

    statusDiv.className = "loading";
    statusDiv.innerHTML = "🔄 変換中…";

    const n5text = convertToN5(text);
    const n5judge = isN5Level(text);

    resultDiv.innerHTML =
      "認識結果: " + text +
      "<br>➡ N5変換: " + n5text +
      "<br>📘 N5判定: " + (n5judge ? "✔ N5レベルです" : "❌ N5レベルではありません");

    if (speechSynthesis.speaking || speechSynthesis.pending) {
      speechSynthesis.cancel();
    }
    const uttr = new SpeechSynthesisUtterance(n5text);
    uttr.lang = "ja-JP";
    uttr.rate = parseFloat(rateSlider.value);
    speechSynthesis.speak(uttr);

    uttr.onend = () => {
      statusDiv.innerHTML = "✔ 完了";
      statusDiv.className = "";
    };
  };

  recognition.onerror = (e) => {
    statusDiv.className = "";
    statusDiv.innerHTML = "❌ エラー: " + e.error;
  };

  recognition.onend = () => {
    if (statusDiv.className === "recording") {
      statusDiv.className = "";
      statusDiv.innerHTML = "⏹ 録音終了";
    }
  };
}
</script>

</body>
</html>
